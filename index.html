<!DOCTYPE html>
<html>
<head>
<title>Finance Tracker</title>

<style>
body{
font-family: Arial;
padding:20px;
background:#f4f4f4;
}

h1{
text-align:center;
}

#balance{
font-size:24px;
margin-bottom:20px;
}

input{
padding:10px;
margin:5px;
width:40%;
}

button{
padding:10px 20px;
}

ul{
margin-top:20px;
padding:0;
}

li{
list-style:none;
padding:8px;
background:white;
margin-bottom:5px;
}

canvas{
margin-top:30px;
max-width:400px;
}
</style>

</head>

<body>

<h1>Finance Tracker</h1>

<h2 id="balance">Balance: $0</h2>

<input id="desc" placeholder="Description">
<input id="amount" type="number" placeholder="Amount">

<button onclick="add()">Add Transaction</button>

<ul id="list"></ul>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

let balance = 0
let transactions = JSON.parse(localStorage.getItem("transactions")) || []
let chart

function save(){
localStorage.setItem("transactions", JSON.stringify(transactions))
}

function render(){

let list = document.getElementById("list")
list.innerHTML = ""
balance = 0

transactions.forEach(t=>{

let li = document.createElement("li")
li.textContent = t.desc + " : $" + t.amount
list.appendChild(li)

balance += t.amount

})

document.getElementById("balance").textContent = "Balance: $" + balance

drawChart()

}

function add(){

let d = document.getElementById("desc").value
let a = parseFloat(document.getElementById("amount").value)

if(!d || !a){
alert("Enter description and amount")
return
}

transactions.push({
desc:d,
amount:a
})

save()
render()

document.getElementById("desc").value=""
document.getElementById("amount").value=""

}

function drawChart(){

let income = 0
let expenses = 0

transactions.forEach(t=>{

if(t.amount > 0){
income += t.amount
}else{
expenses += Math.abs(t.amount)
}

})

let ctx = document.getElementById("chart").getContext("2d")

if(chart){
chart.destroy()
}

chart = new Chart(ctx,{
type:'pie',
data:{
labels:['Income','Expenses'],
datasets:[{
data:[income,expenses]
}]
}
})

}

render()

</script>

</body>
</html>
